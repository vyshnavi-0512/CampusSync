<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webathon-app</title>
    <!-- Google font for branding -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&display=swap" rel="stylesheet">
    <!-- DM Sans for interface text -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS via CDN for utility classes and theming -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // configure Tailwind for this project
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              coral: '#E07A5F',
              lavender: '#9A8C98'
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              shake: {
                '10%, 90%': { transform: 'translateX(-1px)' },
                '20%, 80%': { transform: 'translateX(2px)' },
                '30%, 50%, 70%': { transform: 'translateX(-4px)' },
                '40%, 60%': { transform: 'translateX(4px)' }
              },
              slideInLeft: {
                '0%': { opacity: '0', transform: 'translateX(-100%)' },
                '100%': { opacity: '1', transform: 'translateX(0)' }
              },
              float: {
                '0%,100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' }
              }
            },
            animation: {
              fadeInUp: 'fadeInUp 0.3s ease-out forwards',
              shake: 'shake 0.3s',
              slideInLeft: 'slideInLeft 0.4s ease-out forwards',
              float: 'float 6s ease-in-out infinite'
            }
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Lottie player for left-panel animation -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  </body>
</html>
